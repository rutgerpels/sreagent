name: deploy

# Full GitOps deploy of the ContosoPay environment from CI/CD.
#
# This is the Scenario B "deploy from the beginning with CI/CD" entry point. It
# does exactly what scripts/deploy.* does locally, but in GitHub Actions over
# OIDC (no stored credentials):
#   1. Bootstrap the remote Terraform state storage (idempotent).
#   2. terraform apply (phase 1): platform only -- no apps yet (images don't exist).
#   3. Build + push the three container images to ACR.
#   4. terraform apply (phase 2): the three Container Apps + alert, on the new tag.
#   5. Publish the resulting URLs / names to the job summary.
#
# Run it from the Actions tab (Run workflow). It is intentionally manual
# (workflow_dispatch) so a fresh environment is only ever stood up on purpose.
#
# One-time bootstrap the operator must do first (see docs/scenario-b-gitops.md
# "Part 0"): create the deployment identity, add federated credentials trusting
# this repo, grant it Contributor + Storage Blob Data Contributor on the
# subscription, and set these GitHub Actions *variables*:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# Optional (defaults shown): TF_PREFIX (contosopay), TF_ENVIRONMENT (demo),
#   TF_LOCATION (swedencentral).

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Resource name prefix"
        required: false
        default: "contosopay"
      environment:
        description: "Environment label (dev | demo | test)"
        required: false
        default: "demo"
      location:
        description: "Azure region"
        required: false
        default: "swedencentral"
      open_incident_pr:
        description: "After deploy, auto-open the incident PR that arms the memory leak (Scenario B). Set to false to skip."
        type: boolean
        required: false
        default: true

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-environment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, azure-private, contosopay]
    timeout-minutes: 60
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true" # AAD auth for the state blob (no account keys)
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_PREFIX: ${{ github.event.inputs.prefix || vars.TF_PREFIX || 'contosopay' }}
      TF_ENVIRONMENT: ${{ github.event.inputs.environment || vars.TF_ENVIRONMENT || 'demo' }}
      TF_LOCATION: ${{ github.event.inputs.location || vars.TF_LOCATION || 'swedencentral' }}
      TF_VAR_runner_vnet_resource_group: ${{ vars.RUNNER_NETWORK_RG || 'agentrg' }}
      TF_VAR_runner_vnet_name: ${{ vars.RUNNER_VNET_NAME || 'agent-vnet' }}
      TF_VAR_runner_private_endpoint_subnet_name: ${{ vars.RUNNER_PE_SUBNET_NAME || 'private-endpoints' }}
      TF_VAR_app_vnet_address_space: ${{ vars.APP_VNET_ADDRESS_SPACE || '10.100.0.0/16' }}
      TF_VAR_app_private_endpoint_subnet_address_prefix: ${{ vars.APP_PE_SUBNET_PREFIX || '10.100.0.0/27' }}
      TF_VAR_container_apps_subnet_address_prefix: ${{ vars.CONTAINER_APPS_SUBNET_PREFIX || '10.100.0.64/27' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate healthy demo baseline
        run: |
          set -euo pipefail
          LEAK_STATE="$(sed -nE 's/^[[:space:]]*enable_slow_leak[[:space:]]*=[[:space:]]*(true|false)[[:space:]]*$/\1/p' infra/leak.auto.tfvars)"
          if [[ "${LEAK_STATE}" != "false" ]]; then
            {
              echo "## Invalid demo baseline"
              echo ""
              echo "\`infra/leak.auto.tfvars\` must contain \`enable_slow_leak = false\` before a full deploy."
              echo "The incident is introduced later by the Pull Request created by \`arm-incident\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=infra/leak.auto.tfvars::Expected enable_slow_leak = false, found '${LEAK_STATE:-missing or invalid}'."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Compute backend config + bootstrap state storage
        id: backend
        run: |
          set -euo pipefail
          # Deterministic, non-identifying remote-state names (match scripts/deploy.*).
          STATE_RG="rg-${TF_PREFIX}-tfstate"
          STATE_HASH="$(printf '%s' "${ARM_SUBSCRIPTION_ID}-${TF_PREFIX}" | sha256sum | cut -c1-16)"
          STATE_SA="sttf${STATE_HASH}"
          STATE_CONTAINER="tfstate"
          STATE_KEY="${TF_PREFIX}-${TF_ENVIRONMENT}.tfstate"

          echo "==> Ensuring remote state storage (${STATE_SA})"
          # The state resource group's location is immutable and independent of
          # the app region -- if it already exists (e.g. an earlier deploy in
          # another region), reuse its location so changing TF_LOCATION doesn't
          # fail with InvalidResourceGroupLocation.
          STATE_LOCATION="$(az group show --name "${STATE_RG}" --query location -o tsv 2>/dev/null | tr -d '\r' || true)"
          STATE_LOCATION="${STATE_LOCATION:-${TF_LOCATION}}"
          az group create --name "${STATE_RG}" --location "${STATE_LOCATION}" \
            --tags project=sre-agent-demo env="${TF_ENVIRONMENT}" managed_by=terraform --output none
          if ! az storage account show --name "${STATE_SA}" --resource-group "${STATE_RG}" >/dev/null 2>&1; then
            az storage account create --name "${STATE_SA}" --resource-group "${STATE_RG}" \
              --location "${STATE_LOCATION}" --sku Standard_LRS --kind StorageV2 --min-tls-version TLS1_2 \
              --allow-blob-public-access false --https-only true \
              --public-network-access Disabled --default-action Deny \
              --tags project=sre-agent-demo env="${TF_ENVIRONMENT}" managed_by=terraform --output none
          fi

          STATE_ID="$(az storage account show --name "${STATE_SA}" --resource-group "${STATE_RG}" --query id -o tsv)"
          STATE_PE="pe-${STATE_SA}-blob"
          STATE_ZONE="privatelink.blob.core.windows.net"
          STATE_LINK="${TF_VAR_runner_vnet_name}-blob"
          VNET_ID="$(az network vnet show \
            --resource-group "${TF_VAR_runner_vnet_resource_group}" \
            --name "${TF_VAR_runner_vnet_name}" --query id -o tsv)"

          if ! az network private-dns zone show \
               --resource-group "${TF_VAR_runner_vnet_resource_group}" \
               --name "${STATE_ZONE}" >/dev/null 2>&1; then
            az network private-dns zone create \
              --resource-group "${TF_VAR_runner_vnet_resource_group}" \
              --name "${STATE_ZONE}" --output none
          fi
          if ! az network private-dns link vnet show \
               --resource-group "${TF_VAR_runner_vnet_resource_group}" \
               --zone-name "${STATE_ZONE}" --name "${STATE_LINK}" >/dev/null 2>&1; then
            az network private-dns link vnet create \
              --resource-group "${TF_VAR_runner_vnet_resource_group}" \
              --zone-name "${STATE_ZONE}" --name "${STATE_LINK}" \
              --virtual-network "${VNET_ID}" --registration-enabled false --output none
          fi
          if ! az network private-endpoint show \
               --resource-group "${TF_VAR_runner_vnet_resource_group}" \
               --name "${STATE_PE}" >/dev/null 2>&1; then
            az network private-endpoint create \
              --resource-group "${TF_VAR_runner_vnet_resource_group}" \
              --name "${STATE_PE}" \
              --vnet-name "${TF_VAR_runner_vnet_name}" \
              --subnet "${TF_VAR_runner_private_endpoint_subnet_name}" \
              --private-connection-resource-id "${STATE_ID}" \
              --group-id blob \
              --connection-name "${STATE_PE}-connection" \
              --output none
          fi
          if ! az network private-endpoint dns-zone-group show \
               --resource-group "${TF_VAR_runner_vnet_resource_group}" \
               --endpoint-name "${STATE_PE}" --name blob-zone >/dev/null 2>&1; then
            STATE_ZONE_ID="$(az network private-dns zone show \
              --resource-group "${TF_VAR_runner_vnet_resource_group}" \
              --name "${STATE_ZONE}" --query id -o tsv)"
            az network private-endpoint dns-zone-group create \
              --resource-group "${TF_VAR_runner_vnet_resource_group}" \
              --endpoint-name "${STATE_PE}" --name blob-zone \
              --private-dns-zone "${STATE_ZONE_ID}" --zone-name blob --output none
          fi

          az storage account update --name "${STATE_SA}" --resource-group "${STATE_RG}" \
            --public-network-access Disabled --default-action Deny --output none

          resolved="false"
          for _ in $(seq 1 12); do
            STATE_IP="$(getent ahostsv4 "${STATE_SA}.blob.core.windows.net" | awk 'NR == 1 { print $1 }' || true)"
            if [[ "${STATE_IP}" == 10.* || "${STATE_IP}" == 172.1[6-9].* || \
                  "${STATE_IP}" == 172.2?.* || "${STATE_IP}" == 172.3[01].* || \
                  "${STATE_IP}" == 192.168.* ]]; then
              resolved="true"
              break
            fi
            sleep 10
          done
          [[ "${resolved}" == "true" ]] || {
            echo "::error::State storage did not resolve to a private IP from the self-hosted runner." >&2
            exit 1
          }

          created="false"
          last_err=""
          for _ in $(seq 1 12); do
            if last_err="$(az storage container create --name "${STATE_CONTAINER}" --account-name "${STATE_SA}" \
              --auth-mode login --output none 2>&1)"; then created="true"; break; fi
            sleep 10
          done
          if [[ "${created}" != "true" ]]; then
            echo "::error::Could not create state container '${STATE_CONTAINER}' on '${STATE_SA}' after 12 retries (~2 minutes)." >&2
            echo "Last az CLI error was:" >&2
            echo "${last_err}" >&2
            echo "Check the OIDC identity's Storage Blob Data Contributor role and the Blob private endpoint/DNS." >&2
            exit 1
          fi

          {
            echo "state_rg=${STATE_RG}"
            echo "state_sa=${STATE_SA}"
            echo "state_container=${STATE_CONTAINER}"
            echo "state_key=${STATE_KEY}"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform init (remote state)
        working-directory: infra
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="resource_group_name=${{ steps.backend.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.state_sa }}" \
            -backend-config="container_name=${{ steps.backend.outputs.state_container }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}"

      - name: Terraform apply (phase 1 -- platform, no apps yet)
        working-directory: infra
        run: |
          set -euo pipefail
          STATE_RESOURCES="$(terraform state list)"
          if grep -Fxq 'azurerm_resource_group.this' <<< "${STATE_RESOURCES}"; then
            LOCATION="$(terraform output -raw location)" || {
              echo "::error::Existing state has a resource group but its location output could not be read." >&2
              exit 1
            }
          else
            LOCATION="${TF_LOCATION}"
          fi
          echo "Deploying in region: ${LOCATION}"
          # Subsequent steps must use the immutable location recorded in state.
          echo "TF_LOCATION=${LOCATION}" >> "$GITHUB_ENV"

          terraform apply -input=false -auto-approve \
            -var 'deploy_apps=false' \
            -var "prefix=${TF_PREFIX}" \
            -var "environment=${TF_ENVIRONMENT}" \
            -var "location=${LOCATION}"

      - name: Build and push images
        working-directory: infra
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          ACR_NAME="$(terraform output -raw acr_name)"
          ACR_LOGIN_SERVER="$(terraform output -raw acr_login_server)"
          az acr login --name "${ACR_NAME}"
          for svc in frontend checkout-api payment-service; do
            docker build \
              -t "${ACR_LOGIN_SERVER}/${svc}:${IMAGE_TAG}" \
              -t "${ACR_LOGIN_SERVER}/${svc}:latest" \
              "../src/${svc}"
            docker push "${ACR_LOGIN_SERVER}/${svc}:${IMAGE_TAG}"
            docker push "${ACR_LOGIN_SERVER}/${svc}:latest"
          done

      - name: Terraform apply (phase 2 -- container apps + alert)
        working-directory: infra
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          terraform apply -input=false -auto-approve \
            -var 'deploy_apps=true' \
            -var "image_tag=${IMAGE_TAG}" \
            -var "prefix=${TF_PREFIX}" \
            -var "environment=${TF_ENVIRONMENT}" \
            -var "location=${TF_LOCATION}"

      - name: Publish outputs
        working-directory: infra
        run: |
          set -euo pipefail
          FRONTEND_URL="$(terraform output -raw frontend_url)"
          RESOURCE_GROUP="$(terraform output -raw resource_group_name)"
          ACR_NAME="$(terraform output -raw acr_name)"
          FRONTEND_APP="$(terraform output -raw frontend_app_name)"
          CHECKOUT_APP="$(terraform output -raw checkout_app_name)"
          PAYMENT_APP="$(terraform output -raw payment_app_name)"
          GRAFANA="$(terraform output -raw grafana_endpoint 2>/dev/null || true)"
          {
            echo "## ContosoPay environment deployed"
            echo ""
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| Frontend URL | ${FRONTEND_URL} |"
            echo "| Resource group | ${RESOURCE_GROUP} |"
            [[ -n "${GRAFANA}" && "${GRAFANA}" != "null" ]] && echo "| Grafana | ${GRAFANA} |"
            echo ""
            echo "### Set these GitHub Actions *variables* so deploy-apps.yml can ship code changes:"
            echo ""
            echo "| Variable | Value |"
            echo "| --- | --- |"
            echo "| AZURE_RESOURCE_GROUP | ${RESOURCE_GROUP} |"
            echo "| ACR_NAME | ${ACR_NAME} |"
            echo "| FRONTEND_APP | ${FRONTEND_APP} |"
            echo "| CHECKOUT_APP | ${CHECKOUT_APP} |"
            echo "| PAYMENT_APP | ${PAYMENT_APP} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # After the environment is up, open the Scenario B "arm the leak" Pull Request
  # so the demo is fully in-place: a fresh fork can deploy and immediately have
  # the incident PR waiting to be merged -- no local machine or script required.
  #
  # This reuses scripts/trigger-incident-gitops.sh (single source of truth for
  # the PR title/body/branch naming) and is guarded so re-running deploy will not
  # pile up duplicate incident PRs.
  arm-incident:
    needs: deploy
    if: ${{ github.event.inputs.open_incident_pr != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # push the incident branch
      pull-requests: write # open the incident PR
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # trigger-incident-gitops.sh branches from origin/<base>

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Open incident PR (arm the memory leak)
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Idempotency guard: don't open a second incident PR if one is already
          # open (branch prefix is fixed by the trigger script).
          existing="$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("Feature/trigger-memory-leak-"))] | length')"
          if [[ "${existing}" -gt 0 ]]; then
            {
              echo "## Demo incident PR"
              echo ""
              echo "An incident PR that arms the memory leak is already open; not opening another."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Push the incident branch via the shared script (single source of truth
          # for the flag edit + branch/commit conventions). --no-pr means it only
          # pushes; we create the PR below so we can fall back gracefully.
          BRANCH="Feature/trigger-memory-leak-$(date -u +%Y%m%d%H%M%S)"
          chmod +x ./scripts/trigger-incident-gitops.sh
          ./scripts/trigger-incident-gitops.sh --base "${BASE_BRANCH}" --branch "${BRANCH}" --no-pr

          if ! git ls-remote --exit-code --heads origin "refs/heads/${BRANCH}" >/dev/null; then
            {
              echo "## Demo incident PR was not created"
              echo ""
              echo "The trigger produced no incident branch. Confirm that"
              echo "\`infra/leak.auto.tfvars\` on \`${BASE_BRANCH}\` contains \`enable_slow_leak = false\`, then rerun \`deploy\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Incident branch '${BRANCH}' was not pushed; no Pull Request can be created."
            exit 1
          fi

          TITLE="demo(payment-service): enable slow memory leak (enable_slow_leak=true)"
          BODY="Arms the ContosoPay demo incident (Scenario B). Merging this PR runs the \`apply-infra\` workflow, which \`terraform apply\`s \`enable_slow_leak = true\` so payment-service memory climbs until the Azure Monitor alert fires."
          COMPARE="${{ github.server_url }}/${{ github.repository }}/compare/${BASE_BRANCH}...${BRANCH}?expand=1"

          # gh pr create fails if "Allow GitHub Actions to create and approve pull
          # requests" is disabled (default on a fresh fork). Don't fail the deploy:
          # the branch is pushed, so surface a one-click compare link instead.
          if url="$(gh pr create --base "${BASE_BRANCH}" --head "${BRANCH}" --title "${TITLE}" --body "${BODY}" 2>/tmp/pr.err)"; then
            {
              echo "## Demo incident PR is armed and waiting"
              echo ""
              echo "A Pull Request that sets \`enable_slow_leak = true\` in \`infra/leak.auto.tfvars\` has been opened."
              echo "**Merge it during the demo** to trigger the ContosoPay memory-leak incident (Scenario B)."
              echo ""
              echo "PR: ${url}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Demo incident branch pushed (open the PR manually)"
              echo ""
              echo "The incident branch \`${BRANCH}\` was pushed, but this workflow could not open the PR automatically:"
              echo ""
              echo "> $(cat /tmp/pr.err)"
              echo ""
              echo "This usually means **\"Allow GitHub Actions to create and approve pull requests\"** is off."
              echo "Enable it under **Settings > Actions > General > Workflow permissions**, or just open the PR now:"
              echo ""
              echo "[Open the incident PR](${COMPARE})"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

name: deploy

# Manual, scenario-aware bootstrap and deployment. Each scenario has an isolated
# backend and immutable image tag. Existing state can never be converted in place.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Deployment scenario"
        type: choice
        required: true
        options: [A, B, C]
      prefix:
        description: "Resource name prefix"
        required: false
        default: "contosopay"
      environment:
        description: "Environment label"
        required: false
        default: "demo"
      location:
        description: "Azure region"
        required: false
        default: "swedencentral"
      open_incident_pr:
        description: "Open the PR that arms the memory-leak incident"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: deployment-${{ inputs.scenario }}-${{ inputs.prefix }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate-profile:
    name: Validate deployment profile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate explicit deployment request
        shell: bash
        env:
          SELECTED_SCENARIO: ${{ inputs.scenario }}
          SELECTED_PREFIX: ${{ inputs.prefix }}
          SELECTED_ENVIRONMENT: ${{ inputs.environment }}
          SELECTED_LOCATION: ${{ inputs.location }}
          OPEN_INCIDENT_PR: ${{ inputs.open_incident_pr }}
          IMAGE_TAG: ${{ github.sha }}
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          SRE_AGENT_SPONSOR_GROUP_ID: ${{ vars.SRE_AGENT_SPONSOR_GROUP_ID }}
          ACTIVE_SCENARIO: ${{ vars.DEPLOYMENT_SCENARIO }}
          ACTIVE_PREFIX: ${{ vars.TF_PREFIX }}
          ACTIVE_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT }}
        run: |
          set -euo pipefail
          readonly PREFIX_PATTERN='^[a-z][a-z0-9]{1,16}$'
          readonly ENVIRONMENT_PATTERN='^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$'
          readonly LOCATION_PATTERN='^[a-z][a-z0-9]{1,31}$'
          readonly SHA_PATTERN='^[0-9a-f]{40}$'
          readonly SCENARIO_PATTERN='^(A|B|C)$'
          [[ "${SELECTED_SCENARIO}" =~ ${SCENARIO_PATTERN} ]] || { echo "::error::Scenario must be exactly A, B, or C."; exit 1; }
          [[ "${SELECTED_PREFIX}" =~ ${PREFIX_PATTERN} ]] || { echo "::error::The selected prefix is invalid."; exit 1; }
          [[ "${SELECTED_ENVIRONMENT}" =~ ${ENVIRONMENT_PATTERN} ]] || { echo "::error::The selected environment is invalid."; exit 1; }
          [[ "${SELECTED_LOCATION}" =~ ${LOCATION_PATTERN} ]] || { echo "::error::The selected Azure location is invalid."; exit 1; }
          [[ "${IMAGE_TAG}" =~ ${SHA_PATTERN} ]] || { echo "::error::github.sha is not a full immutable commit SHA."; exit 1; }
          [[ "${OPEN_INCIDENT_PR}" == "true" || "${OPEN_INCIDENT_PR}" == "false" ]] || { echo "::error::Open incident PR must be an explicit boolean."; exit 1; }
          if [[ "${SELECTED_SCENARIO}" == "A" && "${OPEN_INCIDENT_PR}" == "true" ]]; then
            echo "::error::Scenario A uses only the direct incident trigger; it cannot open a GitOps incident PR."
            exit 1
          fi
          for value in ARM_CLIENT_ID ARM_TENANT_ID ARM_SUBSCRIPTION_ID; do
            [[ -n "${!value}" ]] || { echo "::error::Repository variable ${value} is required for OIDC."; exit 1; }
          done
          [[ -n "${SRE_AGENT_SPONSOR_GROUP_ID}" ]] || { echo "::error::Repository variable SRE_AGENT_SPONSOR_GROUP_ID is required to provision the selected SRE Agent."; exit 1; }
          LEAK_STATE="$(sed -nE 's/^[[:space:]]*enable_slow_leak[[:space:]]*=[[:space:]]*(true|false)[[:space:]]*$/\1/p' infra/leak.auto.tfvars)"
          [[ "${LEAK_STATE}" == "false" ]] || { echo "::error file=infra/leak.auto.tfvars::A full deployment requires enable_slow_leak = false."; exit 1; }
          if [[ -n "${ACTIVE_SCENARIO}" ]]; then
            [[ "${ACTIVE_SCENARIO}" =~ ${SCENARIO_PATTERN} ]] || { echo "::error::Nonempty repository variable DEPLOYMENT_SCENARIO must be exactly A, B, or C."; exit 1; }
            [[ "${ACTIVE_PREFIX}" =~ ${PREFIX_PATTERN} ]] || { echo "::error::Repository variable TF_PREFIX must be configured with the active scenario."; exit 1; }
            [[ "${ACTIVE_ENVIRONMENT}" =~ ${ENVIRONMENT_PATTERN} ]] || { echo "::error::Repository variable TF_ENVIRONMENT must be configured with the active scenario."; exit 1; }
            [[ "${ACTIVE_SCENARIO}" == "${SELECTED_SCENARIO}" ]] || { echo "::error::Repository profile ${ACTIVE_SCENARIO} is active. Destroy it and clear DEPLOYMENT_SCENARIO before selecting another scenario."; exit 1; }
            [[ "${ACTIVE_PREFIX}" == "${SELECTED_PREFIX}" && "${ACTIVE_ENVIRONMENT}" == "${SELECTED_ENVIRONMENT}" ]] || { echo "::error::The dispatch target differs from the active repository prefix/environment. Destroy the active profile before changing the automatic target."; exit 1; }
          fi

  deploy:
    needs: validate-profile
    runs-on: ${{ inputs.scenario == 'C' && fromJSON('["self-hosted","Linux","X64","azure-private","contosopay"]') || 'ubuntu-latest' }}
    timeout-minutes: 75
    permissions:
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      DEPLOYMENT_SCENARIO: ${{ inputs.scenario }}
      TF_PREFIX: ${{ inputs.prefix }}
      TF_ENVIRONMENT: ${{ inputs.environment }}
      TF_LOCATION: ${{ inputs.location }}
      IMAGE_TAG: ${{ github.sha }}
      OPEN_INCIDENT_PR: ${{ inputs.open_incident_pr }}
      SRE_AGENT_SPONSOR_GROUP_ID: ${{ vars.SRE_AGENT_SPONSOR_GROUP_ID }}
      SRE_AGENT_MODEL_PROVIDER: ${{ vars.SRE_AGENT_MODEL_PROVIDER || 'MicrosoftFoundry' }}
      SRE_AGENT_MODEL_NAME: ${{ vars.SRE_AGENT_MODEL_NAME || 'gpt-5' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure validated deployment request
        shell: bash
        run: |
          set -euo pipefail
          readonly PREFIX_PATTERN='^[a-z][a-z0-9]{1,16}$'
          readonly ENVIRONMENT_PATTERN='^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$'
          readonly LOCATION_PATTERN='^[a-z][a-z0-9]{1,31}$'
          readonly SHA_PATTERN='^[0-9a-f]{40}$'
          readonly SCENARIO_PATTERN='^(A|B|C)$'
          [[ "${DEPLOYMENT_SCENARIO}" =~ ${SCENARIO_PATTERN} ]] || { echo "::error::Scenario must be exactly A, B, or C."; exit 1; }
          [[ "${TF_PREFIX}" =~ ${PREFIX_PATTERN} ]] || { echo "::error::The selected prefix is invalid."; exit 1; }
          [[ "${TF_ENVIRONMENT}" =~ ${ENVIRONMENT_PATTERN} ]] || { echo "::error::The selected environment is invalid."; exit 1; }
          [[ "${TF_LOCATION}" =~ ${LOCATION_PATTERN} ]] || { echo "::error::The selected Azure location is invalid."; exit 1; }
          [[ "${IMAGE_TAG}" =~ ${SHA_PATTERN} ]] || { echo "::error::github.sha is not a full immutable commit SHA."; exit 1; }
          [[ "${OPEN_INCIDENT_PR}" == "true" || "${OPEN_INCIDENT_PR}" == "false" ]] || { echo "::error::Open incident PR must be an explicit boolean."; exit 1; }
          if [[ "${DEPLOYMENT_SCENARIO}" == "A" && "${OPEN_INCIDENT_PR}" == "true" ]]; then
            echo "::error::Scenario A uses only the direct incident trigger; it cannot open a GitOps incident PR."
            exit 1
          fi
          for value in ARM_CLIENT_ID ARM_TENANT_ID ARM_SUBSCRIPTION_ID; do
            [[ -n "${!value}" ]] || { echo "::error::Repository variable ${value} is required for OIDC."; exit 1; }
          done
          [[ -n "${SRE_AGENT_SPONSOR_GROUP_ID}" ]] || { echo "::error::Repository variable SRE_AGENT_SPONSOR_GROUP_ID is required to provision the selected SRE Agent."; exit 1; }
          LEAK_STATE="$(sed -nE 's/^[[:space:]]*enable_slow_leak[[:space:]]*=[[:space:]]*(true|false)[[:space:]]*$/\1/p' infra/leak.auto.tfvars)"
          [[ "${LEAK_STATE}" == "false" ]] || { echo "::error file=infra/leak.auto.tfvars::A full deployment requires enable_slow_leak = false."; exit 1; }
          {
            echo "TF_VAR_scenario=${DEPLOYMENT_SCENARIO}"
            echo "TF_VAR_enable_sre_agents=true"
            echo "TF_VAR_sre_agent_sponsor_group_id=${SRE_AGENT_SPONSOR_GROUP_ID}"
            echo "TF_VAR_sre_agent_model_provider=${SRE_AGENT_MODEL_PROVIDER}"
            echo "TF_VAR_sre_agent_model_name=${SRE_AGENT_MODEL_NAME}"
          } >> "${GITHUB_ENV}"

      # Only Scenario C receives private-runner network configuration.
      - name: Configure Scenario C private networking
        if: ${{ inputs.scenario == 'C' }}
        shell: bash
        env:
          RUNNER_NETWORK_RG: ${{ vars.RUNNER_NETWORK_RG || 'agentrg' }}
          RUNNER_VNET_NAME: ${{ vars.RUNNER_VNET_NAME || 'agent-vnet' }}
          RUNNER_PE_SUBNET_NAME: ${{ vars.RUNNER_PE_SUBNET_NAME || 'private-endpoints' }}
          APP_VNET_ADDRESS_SPACE: ${{ vars.APP_VNET_ADDRESS_SPACE || '10.100.0.0/16' }}
          APP_PE_SUBNET_PREFIX: ${{ vars.APP_PE_SUBNET_PREFIX || '10.100.0.0/27' }}
          CONTAINER_APPS_SUBNET_PREFIX: ${{ vars.CONTAINER_APPS_SUBNET_PREFIX || '10.100.0.64/27' }}
          SRE_AGENT_SUBNET_PREFIX: ${{ vars.SRE_AGENT_SUBNET_PREFIX || '10.100.0.96/27' }}
        run: |
          {
            echo "TF_VAR_runner_vnet_resource_group=${RUNNER_NETWORK_RG}"
            echo "TF_VAR_runner_vnet_name=${RUNNER_VNET_NAME}"
            echo "TF_VAR_runner_private_endpoint_subnet_name=${RUNNER_PE_SUBNET_NAME}"
            echo "TF_VAR_app_vnet_address_space=${APP_VNET_ADDRESS_SPACE}"
            echo "TF_VAR_app_private_endpoint_subnet_address_prefix=${APP_PE_SUBNET_PREFIX}"
            echo "TF_VAR_container_apps_subnet_address_prefix=${CONTAINER_APPS_SUBNET_PREFIX}"
            echo "TF_VAR_sre_agent_subnet_address_prefix=${SRE_AGENT_SUBNET_PREFIX}"
          } >> "${GITHUB_ENV}"

      - name: Validate and configure Scenario C broker metadata
        if: ${{ inputs.scenario == 'C' }}
        shell: bash
        env:
          ENTRA_CLIENT_ID: ${{ vars.SRE_REMEDIATION_ENTRA_API_CLIENT_ID }}
          TOKEN_AUDIENCE: ${{ vars.SRE_REMEDIATION_ENTRA_TOKEN_AUDIENCE }}
          TOKEN_SCOPE: ${{ vars.SRE_REMEDIATION_ENTRA_TOKEN_SCOPE }}
          GITHUB_APP_ID: ${{ vars.SRE_GITHUB_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.SRE_GITHUB_APP_INSTALLATION_ID }}
          GITHUB_APP_BOT_LOGIN: ${{ vars.SRE_GITHUB_APP_BOT_LOGIN }}
          PRIVATE_KEY_NAME: ${{ vars.SRE_GITHUB_APP_PRIVATE_KEY_NAME || 'github-app-signing-key' }}
        run: |
          set -euo pipefail
          missing=()
          for value in ENTRA_CLIENT_ID TOKEN_AUDIENCE TOKEN_SCOPE GITHUB_APP_ID GITHUB_APP_INSTALLATION_ID GITHUB_APP_BOT_LOGIN; do
            [[ -n "${!value}" ]] || missing+=("${value}")
          done
          if (( ${#missing[@]} )); then
            {
              echo "## Scenario C manual setup required before deployment"
              echo ""
              echo "The broker metadata variables are incomplete: \`${missing[*]}\`."
              echo "Create the dedicated Entra API registration and broker GitHub App manually, install the App, then set the corresponding non-secret repository variables. No undocumented API is called by this workflow."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error::Missing Scenario C broker metadata: ${missing[*]}"
            exit 1
          fi
          [[ "${TOKEN_AUDIENCE,,}" == "${ENTRA_CLIENT_ID,,}" ]] || { echo "::error::Broker v2 token audience must equal the Entra API client ID."; exit 1; }
          [[ "${TOKEN_SCOPE,,}" == "api://${ENTRA_CLIENT_ID,,}/.default" ]] || { echo "::error::Broker scope must be api://<Entra client ID>/.default."; exit 1; }
          {
            echo "TF_VAR_sre_remediation_entra_api_client_id=${ENTRA_CLIENT_ID}"
            echo "TF_VAR_sre_remediation_entra_token_audience=${TOKEN_AUDIENCE}"
            echo "TF_VAR_sre_remediation_entra_token_scope=${TOKEN_SCOPE}"
            echo "TF_VAR_sre_remediation_github_app_id=${GITHUB_APP_ID}"
            echo "TF_VAR_sre_remediation_github_app_installation_id=${GITHUB_APP_INSTALLATION_ID}"
            echo "TF_VAR_sre_remediation_github_app_bot_login=${GITHUB_APP_BOT_LOGIN}"
            echo "TF_VAR_sre_remediation_github_repository_owner=${GITHUB_REPOSITORY_OWNER}"
            echo "TF_VAR_sre_remediation_github_repository_name=${GITHUB_REPOSITORY#*/}"
            echo "TF_VAR_sre_remediation_github_app_private_key_name=${PRIVATE_KEY_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Bootstrap scenario-isolated backend
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          readonly PRIVATE_IPV4_PATTERN='^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)'
          STATE_RG="rg-${TF_PREFIX}-tfstate"
          STATE_HASH="$(printf '%s\0%s\0%s' "${ARM_SUBSCRIPTION_ID}" "${TF_PREFIX}" "${DEPLOYMENT_SCENARIO}" | sha256sum | cut -c1-16)"
          STATE_SA="sttf${STATE_HASH}"
          STATE_CONTAINER="tfstate"
          STATE_KEY="${TF_PREFIX}-${DEPLOYMENT_SCENARIO}-${TF_ENVIRONMENT}.tfstate"
          STATE_LOCATION="$(az group show -n "${STATE_RG}" --query location -o tsv 2>/dev/null | tr -d '\r' || true)"
          STATE_LOCATION="${STATE_LOCATION:-${TF_LOCATION}}"

          az group create -n "${STATE_RG}" -l "${STATE_LOCATION}" --tags project=sre-agent-demo managed_by=github-actions --output none
          if ! az storage account show -n "${STATE_SA}" -g "${STATE_RG}" >/dev/null 2>&1; then
            if [[ "${DEPLOYMENT_SCENARIO}" == "C" ]]; then public_access=Disabled; default_action=Deny; else public_access=Enabled; default_action=Allow; fi
            az storage account create -n "${STATE_SA}" -g "${STATE_RG}" -l "${STATE_LOCATION}" \
              --sku Standard_LRS --kind StorageV2 --min-tls-version TLS1_2 \
              --allow-blob-public-access false --allow-shared-key-access false --https-only true \
              --public-network-access "${public_access}" --default-action "${default_action}" \
              --tags project=sre-agent-demo scenario="${DEPLOYMENT_SCENARIO}" managed_by=github-actions --output none
          fi
          STATE_ID="$(az storage account show -n "${STATE_SA}" -g "${STATE_RG}" --query id -o tsv)"
          DEPLOYER_OBJECT_ID="$(az ad sp show --id "${ARM_CLIENT_ID}" --query id -o tsv)"
          az role assignment create \
            --assignee-object-id "${DEPLOYER_OBJECT_ID}" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "${STATE_ID}" \
            --output none 2>/dev/null || true

          if [[ "${DEPLOYMENT_SCENARIO}" == "C" ]]; then
            az storage account update -n "${STATE_SA}" -g "${STATE_RG}" --public-network-access Disabled --default-action Deny --output none
            STATE_PE="pe-${STATE_SA}-blob"
            STATE_ZONE="privatelink.blob.core.windows.net"
            STATE_LINK="${TF_VAR_runner_vnet_name}-blob"
            VNET_ID="$(az network vnet show -g "${TF_VAR_runner_vnet_resource_group}" -n "${TF_VAR_runner_vnet_name}" --query id -o tsv)"
            az network private-dns zone show -g "${TF_VAR_runner_vnet_resource_group}" -n "${STATE_ZONE}" >/dev/null 2>&1 || \
              az network private-dns zone create -g "${TF_VAR_runner_vnet_resource_group}" -n "${STATE_ZONE}" --output none
            az network private-dns link vnet show -g "${TF_VAR_runner_vnet_resource_group}" -z "${STATE_ZONE}" -n "${STATE_LINK}" >/dev/null 2>&1 || \
              az network private-dns link vnet create -g "${TF_VAR_runner_vnet_resource_group}" -z "${STATE_ZONE}" -n "${STATE_LINK}" -v "${VNET_ID}" -e false --output none
            az network private-endpoint show -g "${TF_VAR_runner_vnet_resource_group}" -n "${STATE_PE}" >/dev/null 2>&1 || \
              az network private-endpoint create -g "${TF_VAR_runner_vnet_resource_group}" -n "${STATE_PE}" --vnet-name "${TF_VAR_runner_vnet_name}" --subnet "${TF_VAR_runner_private_endpoint_subnet_name}" --private-connection-resource-id "${STATE_ID}" --group-id blob --connection-name "${STATE_PE}-connection" --output none
            if ! az network private-endpoint dns-zone-group show -g "${TF_VAR_runner_vnet_resource_group}" --endpoint-name "${STATE_PE}" -n blob-zone >/dev/null 2>&1; then
              STATE_ZONE_ID="$(az network private-dns zone show -g "${TF_VAR_runner_vnet_resource_group}" -n "${STATE_ZONE}" --query id -o tsv)"
              az network private-endpoint dns-zone-group create -g "${TF_VAR_runner_vnet_resource_group}" --endpoint-name "${STATE_PE}" -n blob-zone --private-dns-zone "${STATE_ZONE_ID}" --zone-name blob --output none
            fi
            for _ in $(seq 1 12); do
              STATE_IP="$(getent ahostsv4 "${STATE_SA}.blob.core.windows.net" | awk 'NR == 1 {print $1}' || true)"
              [[ "${STATE_IP}" =~ ${PRIVATE_IPV4_PATTERN} ]] && break
              sleep 10
            done
            [[ "${STATE_IP:-}" =~ ${PRIVATE_IPV4_PATTERN} ]] || { echo "::error::Scenario C state endpoint did not resolve privately."; exit 1; }
          else
            az storage account update -n "${STATE_SA}" -g "${STATE_RG}" --public-network-access Enabled --default-action Allow --output none
          fi

          created=false
          for _ in $(seq 1 12); do
            if az storage container create -n "${STATE_CONTAINER}" --account-name "${STATE_SA}" --auth-mode login --output none; then created=true; break; fi
            sleep 10
          done
          [[ "${created}" == true ]] || { echo "::error::Could not create the remote state container using OIDC."; exit 1; }
          {
            echo "state_rg=${STATE_RG}"
            echo "state_sa=${STATE_SA}"
            echo "state_container=${STATE_CONTAINER}"
            echo "state_key=${STATE_KEY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Terraform init
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="resource_group_name=${{ steps.backend.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.state_sa }}" \
            -backend-config="container_name=${{ steps.backend.outputs.state_container }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}"

      - name: Apply platform and enforce state profile
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          STATE_RESOURCES="$(terraform state list 2>/dev/null || true)"
          if [[ -n "${STATE_RESOURCES}" ]]; then
            if ACTUAL_SCENARIO="$(terraform output -raw scenario 2>/dev/null)"; then
              [[ "${ACTUAL_SCENARIO}" == "${DEPLOYMENT_SCENARIO}" ]] || {
                echo "::error::State scenario '${ACTUAL_SCENARIO}' does not match requested scenario '${DEPLOYMENT_SCENARIO}'. Destroy the existing profile first; in-place conversion is forbidden."
                exit 1
              }
              TF_LOCATION="$(terraform output -raw location)"
              echo "TF_LOCATION=${TF_LOCATION}" >> "${GITHUB_ENV}"
            elif grep -q '^azurerm_container_app\.app\[' <<< "${STATE_RESOURCES}"; then
              echo "::error::Existing application state has no scenario output. In-place conversion is unsupported; destroy it with its original workflow first."
              exit 1
            else
              echo "Recovering incomplete ${DEPLOYMENT_SCENARIO} platform state that predates stored outputs."
            fi
          fi
          HAS_APPS=false
          grep -q '^azurerm_container_app\.app\[' <<< "${STATE_RESOURCES}" && HAS_APPS=true
          required_resources=(
            azurerm_resource_group.this
            azurerm_container_registry.this
            azurerm_key_vault.this
            azurerm_container_app_environment.this
          )
          platform_complete=true
          for resource in "${required_resources[@]}"; do
            grep -Fxq "${resource}" <<< "${STATE_RESOURCES}" || platform_complete=false
          done
          for output in scenario location acr_name acr_login_server key_vault_name resource_group_name; do
            terraform output -raw "${output}" >/dev/null 2>&1 || platform_complete=false
          done

          if [[ "${HAS_APPS}" == false ]]; then
            echo "Applying or recovering the ${DEPLOYMENT_SCENARIO} platform before image publication."
            terraform apply -input=false -auto-approve \
              -var 'deploy_apps=false' -var "image_tag=${IMAGE_TAG}" \
              -var "scenario=${DEPLOYMENT_SCENARIO}" -var "prefix=${TF_PREFIX}" \
              -var "environment=${TF_ENVIRONMENT}" -var "location=${TF_LOCATION}"
          elif [[ "${platform_complete}" == false ]]; then
            PREVIOUS_DIGESTS="$(terraform output -json image_digests 2>/dev/null | jq -c .)" || {
              echo "::error::Partial application state has no prior digest map. Digest migration requires a clean scenario deployment."
              exit 1
            }
            echo "Recovering incomplete platform resources while preserving existing digest-pinned applications."
            terraform apply -input=false -auto-approve \
              -var 'deploy_apps=true' -var "image_tag=${IMAGE_TAG}" \
              -var "image_digests=${PREVIOUS_DIGESTS}" \
              -var "scenario=${DEPLOYMENT_SCENARIO}" -var "prefix=${TF_PREFIX}" \
              -var "environment=${TF_ENVIRONMENT}" -var "location=${TF_LOCATION}"
          else
            echo "Existing ${DEPLOYMENT_SCENARIO} applications detected; preserving running revisions until immutable images are available."
          fi
          STATE_RESOURCES="$(terraform state list)"
          for resource in "${required_resources[@]}"; do
            grep -Fxq "${resource}" <<< "${STATE_RESOURCES}" || { echo "::error::Required platform resource ${resource} remains absent after recovery."; exit 1; }
          done
          for output in scenario location acr_name acr_login_server key_vault_name resource_group_name; do
            terraform output -raw "${output}" >/dev/null || { echo "::error::Required platform output ${output} remains absent after recovery."; exit 1; }
          done
          ACTUAL_SCENARIO="$(terraform output -raw scenario)"
          [[ "${ACTUAL_SCENARIO}" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::Terraform created an unexpected scenario '${ACTUAL_SCENARIO}'."; exit 1; }

      - name: Build and push immutable images
        id: images
        shell: bash
        run: |
          set -euo pipefail
          ACR_NAME="$(terraform -chdir=infra output -raw acr_name)"
          ACR_LOGIN_SERVER="$(terraform -chdir=infra output -raw acr_login_server)"
          az acr login --name "${ACR_NAME}"
          services=(frontend checkout-api payment-service)
          [[ "${DEPLOYMENT_SCENARIO}" == "C" ]] && services+=(sre-remediation-mcp)
          DIGEST_FILE="${RUNNER_TEMP}/image-digests.json"
          bash scripts/publish-immutable-images.sh \
            "${ACR_NAME}" "${ACR_LOGIN_SERVER}" "${IMAGE_TAG}" "${DIGEST_FILE}" "${services[@]}"
          DIGESTS="$(jq -c . "${DIGEST_FILE}")"
          echo "image_digests=${DIGESTS}" >> "${GITHUB_OUTPUT}"
          echo "TF_VAR_image_digests=${DIGESTS}" >> "${GITHUB_ENV}"

      - name: Verify Scenario C remediation key prerequisite
        if: ${{ inputs.scenario == 'C' }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_VAULT_NAME="$(terraform -chdir=infra output -raw key_vault_name)"
          bash scripts/verify-remediation-key.sh "${KEY_VAULT_NAME}" "${TF_VAR_sre_remediation_github_app_private_key_name}"

      - name: Apply applications
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(terraform output -raw scenario)" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::Scenario changed before application apply."; exit 1; }
          terraform apply -input=false -auto-approve \
            -var 'deploy_apps=true' -var "image_tag=${IMAGE_TAG}" \
            -var "scenario=${DEPLOYMENT_SCENARIO}" -var "prefix=${TF_PREFIX}" \
            -var "environment=${TF_ENVIRONMENT}" -var "location=${TF_LOCATION}"
          [[ "$(terraform output -raw scenario)" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::Applied state scenario mismatch."; exit 1; }

      - name: Publish deployment outputs and manual boundaries
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_URL="$(terraform output -raw frontend_url)"
          RESOURCE_GROUP="$(terraform output -raw resource_group_name)"
          ACR_NAME="$(terraform output -raw acr_name)"
          KEY_VAULT_NAME="$(terraform output -raw key_vault_name)"
          {
            echo "## Scenario ${DEPLOYMENT_SCENARIO} deployed"
            echo ""
            echo "- Environment: \`${TF_PREFIX}/${TF_ENVIRONMENT}\`"
            echo "- Immutable image tag: \`${IMAGE_TAG}\`"
            echo "- Resource group: \`${RESOURCE_GROUP}\`"
            echo "- ACR: \`${ACR_NAME}\`"
            echo "- Frontend: ${FRONTEND_URL}"
            echo ""
            echo "### Activate push deployment"
            echo "After reviewing this successful deployment, set these repository Actions variables:"
            echo "- \`TF_PREFIX=${TF_PREFIX}\`"
            echo "- \`TF_ENVIRONMENT=${TF_ENVIRONMENT}\`"
            echo "- \`DEPLOYMENT_SCENARIO=${DEPLOYMENT_SCENARIO}\` (set this activation marker last)"
            echo "Keep \`DEPLOYMENT_SCENARIO\` unset until all three values are configured; push-triggered infrastructure and application workflows remain safe no-ops while it is unset."
            if [[ "${DEPLOYMENT_SCENARIO}" == "A" ]]; then
              echo ""
              echo "### Manual boundary"
              echo "Configure the SRE portal for direct/autonomous Azure remediation. Scenario A has no GitOps write connector and no broker."
            elif [[ "${DEPLOYMENT_SCENARIO}" == "B" ]]; then
              echo ""
              echo "### Manual boundary"
              echo "Configure the built-in GitHub MCP connector in the SRE portal with a short-lived fine-grained PAT. Create and rotate that PAT manually; this workflow never receives it. Scenario B never deploys the broker."
            else
              BROKER_APP="$(terraform output -raw sre_remediation_broker_app_name)"
              BROKER_ENDPOINT="$(terraform output -raw sre_remediation_broker_endpoint_url)"
              BROKER_KEY_URI="$(terraform output -raw sre_remediation_broker_key_uri)"
              [[ -n "${BROKER_APP}" && "${BROKER_APP}" != null && -n "${BROKER_ENDPOINT}" && "${BROKER_ENDPOINT}" != null ]] || { echo "::error::Expected broker outputs are absent. Expected sre_remediation_broker_app_name and sre_remediation_broker_endpoint_url."; exit 1; }
              echo "- Broker app: \`${BROKER_APP}\`"
              echo "- Broker endpoint: ${BROKER_ENDPOINT}"
              echo ""
              echo "### Scenario C manual prerequisites"
              echo "Terraform-supported broker infrastructure and the broker image are deployed. Complete only these unsupported/manual boundaries:"
              echo "1. Create/configure the two least-privilege GitHub Apps and install them on this repository."
              echo "2. Import the broker App PEM key material once into Key Vault \`${KEY_VAULT_NAME}\` to the Key Vault key URI \`${BROKER_KEY_URI}\`; never put the PEM in GitHub Actions."
              echo "3. Complete the dedicated Entra application registration/consent if it was not already created for the metadata supplied to this run."
              echo "4. Configure the SRE portal connector and restrictive tool policy for the broker endpoint."
              echo ""
              echo "No undocumented GitHub, Azure, or SRE portal API is called by this workflow."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  arm-incident:
    needs: deploy
    if: ${{ inputs.open_incident_pr == true && inputs.scenario != 'A' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      DEPLOYMENT_SCENARIO: ${{ inputs.scenario }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Open incident PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          existing="$(gh pr list --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("Feature/trigger-memory-leak-"))] | length')"
          if [[ "${existing}" -gt 0 ]]; then
            echo "An incident PR is already open." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          BRANCH="Feature/trigger-memory-leak-$(date -u +%Y%m%d%H%M%S)"
          chmod +x ./scripts/trigger-incident-gitops.sh
          ./scripts/trigger-incident-gitops.sh --base "${BASE_BRANCH}" --branch "${BRANCH}" --no-pr
          git ls-remote --exit-code --heads origin "refs/heads/${BRANCH}" >/dev/null || { echo "::error::Incident branch was not pushed."; exit 1; }
          TITLE="demo(payment-service): enable slow memory leak (enable_slow_leak=true)"
          BODY="Arms the ContosoPay Scenario ${DEPLOYMENT_SCENARIO} incident. Merging applies the leak flag through the scenario-isolated infrastructure workflow."
          COMPARE="${{ github.server_url }}/${{ github.repository }}/compare/${BASE_BRANCH}...${BRANCH}?expand=1"
          if url="$(gh pr create --base "${BASE_BRANCH}" --head "${BRANCH}" --title "${TITLE}" --body "${BODY}" 2>/tmp/pr.err)"; then
            echo "Scenario ${DEPLOYMENT_SCENARIO} incident PR: ${url}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Incident branch pushed; open the PR manually: ${COMPARE}" >> "${GITHUB_STEP_SUMMARY}"
            echo "::warning::GitHub Actions could not open the PR; repository workflow settings may disallow it."
          fi
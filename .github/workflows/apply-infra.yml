name: apply-infra

# GitOps deploy of the ContosoPay infrastructure flag changes.
#
# When a PR that edits infra/leak.auto.tfvars (the planted memory-leak toggle)
# is merged to main, this workflow runs `terraform apply` against the REMOTE
# azurerm state, so the change is deployed the IaC way -- no one runs
# `az containerapp update` by hand. This is what makes both the incident trigger
# (PR sets enable_slow_leak = true) and the SRE Agent's remediation (PR sets it
# back to false) real GitOps flows.
#
# Authentication is OIDC-only (no stored credentials). The operator configures
# these GitHub Actions *variables* (Settings > Secrets and variables > Actions):
#   AZURE_CLIENT_ID        - federated app/identity client id
#   AZURE_TENANT_ID        - tenant id
#   AZURE_SUBSCRIPTION_ID  - subscription id
# Optional (default shown):
#   TF_PREFIX (contosopay), TF_ENVIRONMENT (demo), TF_LOCATION (swedencentral)
#
# The remote-state backend names are computed deterministically from the
# subscription id + prefix (the same formula as deploy.yml and scripts/deploy.*),
# so there is nothing extra to copy between deploys.
#
# The federated identity needs, at minimum:
#   * Contributor on the demo resource group (to apply container app changes)
#   * Storage Blob Data Contributor on the state storage account
# A federated credential must trust this repo on the main branch
#   subject: repo:OWNER/REPO:ref:refs/heads/main

on:
  push:
    branches: [main]
    paths:
      - "infra/leak.auto.tfvars"
      - "infra/**.tf"
      - ".github/workflows/apply-infra.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-environment
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: [self-hosted, Linux, X64, azure-private, contosopay]
    timeout-minutes: 45
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true" # AAD auth for the state blob (no account keys)
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_PREFIX: ${{ vars.TF_PREFIX || 'contosopay' }}
      TF_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT || 'demo' }}
      TF_LOCATION: ${{ vars.TF_LOCATION || 'swedencentral' }}
      TF_VAR_runner_vnet_resource_group: ${{ vars.RUNNER_NETWORK_RG || 'agentrg' }}
      TF_VAR_runner_vnet_name: ${{ vars.RUNNER_VNET_NAME || 'agent-vnet' }}
      TF_VAR_runner_private_endpoint_subnet_name: ${{ vars.RUNNER_PE_SUBNET_NAME || 'private-endpoints' }}
      TF_VAR_app_vnet_address_space: ${{ vars.APP_VNET_ADDRESS_SPACE || '10.100.0.0/16' }}
      TF_VAR_app_private_endpoint_subnet_address_prefix: ${{ vars.APP_PE_SUBNET_PREFIX || '10.100.0.0/27' }}
      TF_VAR_container_apps_subnet_address_prefix: ${{ vars.CONTAINER_APPS_SUBNET_PREFIX || '10.100.0.64/27' }}
      TF_VAR_enable_sre_remediation_broker: ${{ vars.ENABLE_SRE_REMEDIATION_BROKER || 'false' }}
      TF_VAR_sre_remediation_allowed_caller_principal_id: ${{ vars.SRE_REMEDIATION_CALLER_PRINCIPAL_ID }}
      TF_VAR_sre_remediation_entra_api_client_id: ${{ vars.SRE_REMEDIATION_ENTRA_API_CLIENT_ID }}
      TF_VAR_sre_remediation_entra_token_audience: ${{ vars.SRE_REMEDIATION_ENTRA_TOKEN_AUDIENCE }}
      TF_VAR_sre_remediation_entra_token_scope: ${{ vars.SRE_REMEDIATION_ENTRA_TOKEN_SCOPE }}
      TF_VAR_sre_remediation_github_app_id: ${{ vars.SRE_GITHUB_APP_ID }}
      TF_VAR_sre_remediation_github_app_installation_id: ${{ vars.SRE_GITHUB_APP_INSTALLATION_ID }}
      TF_VAR_sre_remediation_github_app_bot_login: ${{ vars.SRE_GITHUB_APP_BOT_LOGIN }}
      TF_VAR_sre_remediation_github_repository_owner: ${{ github.repository_owner }}
      TF_VAR_sre_remediation_github_repository_name: ${{ github.event.repository.name }}
      TF_VAR_sre_remediation_github_app_private_key_secret_name: ${{ vars.SRE_GITHUB_APP_PRIVATE_KEY_SECRET_NAME || 'github-app-private-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Compute backend config
        id: backend
        run: |
          set -euo pipefail
          # Deterministic, non-identifying remote-state names (match deploy.yml / scripts/deploy.*).
          STATE_HASH="$(printf '%s' "${ARM_SUBSCRIPTION_ID}-${TF_PREFIX}" | sha256sum | cut -c1-16)"
          {
            echo "state_rg=rg-${TF_PREFIX}-tfstate"
            echo "state_sa=sttf${STATE_HASH}"
            echo "state_container=tfstate"
            echo "state_key=${TF_PREFIX}-${TF_ENVIRONMENT}.tfstate"
          } >> "$GITHUB_OUTPUT"

      - name: Check remote state exists
        id: state
        run: |
          set -euo pipefail
          # Preflight guard: apply-infra only runs against an environment that the
          # 'deploy' workflow has already provisioned (it creates the remote-state
          # storage account). On the initial bootstrap merge the state account does
          # not exist yet, so skip the apply steps cleanly and keep the run green.
          if az storage account show \
               --name "${{ steps.backend.outputs.state_sa }}" \
               --resource-group "${{ steps.backend.outputs.state_rg }}" >/dev/null 2>&1; then
            STATE_BLOB_EXISTS="$(az storage blob exists \
              --account-name "${{ steps.backend.outputs.state_sa }}" \
              --container-name "${{ steps.backend.outputs.state_container }}" \
              --name "${{ steps.backend.outputs.state_key }}" \
              --auth-mode login --query exists -o tsv 2>/dev/null || echo false)"
            echo "exists=${STATE_BLOB_EXISTS}" >> "$GITHUB_OUTPUT"
            if [[ "${STATE_BLOB_EXISTS}" != "true" ]]; then
              echo "::notice::Remote Terraform state blob does not exist yet. Run the 'deploy' workflow first; skipping apply-infra."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Remote Terraform state not found yet. Run the 'deploy' workflow first to create the environment; skipping apply-infra."
          fi

      - name: Terraform init (remote state)
        if: steps.state.outputs.exists == 'true'
        working-directory: infra
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="resource_group_name=${{ steps.backend.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.state_sa }}" \
            -backend-config="container_name=${{ steps.backend.outputs.state_container }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}"

      - name: Check environment state
        id: environment
        if: steps.state.outputs.exists == 'true'
        working-directory: infra
        run: |
          set -euo pipefail
          STATE_RESOURCES="$(terraform state list)"
          if grep -Fxq 'azurerm_resource_group.this' <<< "${STATE_RESOURCES}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Terraform state contains no deployed environment. Run the 'deploy' workflow first; skipping apply-infra."
          fi

      - name: Terraform apply
        if: steps.environment.outputs.exists == 'true'
        working-directory: infra
        run: |
          set -euo pipefail

          # The environment's region is fixed at first deploy and is NOT part of
          # the remote-state key, so a mismatched TF_LOCATION (e.g. the default
          # swedencentral while the env is in francecentral) would try to relocate
          # every resource -- a destroy/recreate of the whole environment. Always
          # reuse the region recorded in state.
          LOCATION="$(terraform output -raw location)" || {
            echo "::error::Existing environment location could not be read from Terraform state." >&2
            exit 1
          }
          echo "Applying in region: ${LOCATION}"

          terraform apply -input=false -auto-approve \
            -var 'deploy_apps=true' \
            -var 'image_tag=latest' \
            -var "prefix=${TF_PREFIX}" \
            -var "environment=${TF_ENVIRONMENT}" \
            -var "location=${LOCATION}"

      - name: Report leak state
        if: steps.environment.outputs.exists == 'true'
        working-directory: infra
        run: |
          echo "enable_slow_leak applied. Current payment-service revision will reflect the flag."
          terraform output -raw payment_app_name || true

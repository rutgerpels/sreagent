name: destroy

# Tear down the ContosoPay environment that `deploy` (Scenario B) stood up.
#
# This is the CI/CD mirror of scripts/teardown.* -- it runs `terraform destroy`
# against the SAME remote state the deploy pipeline writes to, over OIDC (no
# stored credentials). It removes every resource Terraform manages: the Container
# Apps, ACR, Key Vault, alert rule, identities, observability, etc.
#
# It is intentionally manual (workflow_dispatch) and guarded: you must type the
# resource prefix into the `confirm` box, otherwise the run aborts. This prevents
# an accidental teardown of a live demo environment.
#
# Resilience: the normal path retries after deleting orphaned Container Apps if
# the environment delete hits 409 ManagedEnvironmentHasContainerApps (state drift
# from a cancelled/re-run apply). For a badly drifted environment, set
# `force_delete_rg` to nuke the env resource group(s) directly and reset state.
#
# Prerequisites are identical to deploy.yml -- the same deployment identity and
# GitHub Actions *variables* must already be set:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# Optional (defaults shown): TF_PREFIX (contosopay), TF_ENVIRONMENT (demo),
#   TF_LOCATION (swedencentral).
#
# Note: the Key Vault has purge protection enabled, so it is soft-deleted (not
# purged) and ages out after its retention window. The random name suffix means
# this never blocks a future deploy.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type the resource prefix to confirm destruction (e.g. contosopay)"
        required: true
      prefix:
        description: "Resource name prefix"
        required: false
        default: "contosopay"
      environment:
        description: "Environment label (dev | demo | test)"
        required: false
        default: "demo"
      location:
        description: "Azure region"
        required: false
        default: "swedencentral"
      delete_state_storage:
        description: "Also delete the remote Terraform state storage RG after destroy"
        type: boolean
        required: false
        default: false
      force_delete_rg:
        description: "Nuke: delete the env resource group(s) rg-<prefix>-<env>-* directly and reset remote state. Use when terraform destroy is stuck on orphaned resources / drifted state."
        type: boolean
        required: false
        default: false

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-environment # share with deploy.yml so the two never overlap
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: [self-hosted, Linux, X64, azure-private, contosopay]
    timeout-minutes: 60
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true" # AAD auth for the state blob (no account keys)
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_PREFIX: ${{ github.event.inputs.prefix || vars.TF_PREFIX || 'contosopay' }}
      TF_ENVIRONMENT: ${{ github.event.inputs.environment || vars.TF_ENVIRONMENT || 'demo' }}
      TF_LOCATION: ${{ github.event.inputs.location || vars.TF_LOCATION || 'swedencentral' }}
      TF_VAR_runner_vnet_resource_group: ${{ vars.RUNNER_NETWORK_RG || 'agentrg' }}
      TF_VAR_runner_vnet_name: ${{ vars.RUNNER_VNET_NAME || 'agent-vnet' }}
      TF_VAR_runner_private_endpoint_subnet_name: ${{ vars.RUNNER_PE_SUBNET_NAME || 'private-endpoints' }}
      TF_VAR_container_apps_subnet_address_prefix: ${{ vars.CONTAINER_APPS_SUBNET_PREFIX || '192.168.1.128/27' }}
    steps:
      - name: Validate confirmation
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          set -euo pipefail
          if [[ "${CONFIRM_INPUT}" != "${TF_PREFIX}" ]]; then
            echo "::error::Confirmation does not match prefix '${TF_PREFIX}'. Aborting." >&2
            exit 1
          fi
          echo "Confirmation matched prefix '${TF_PREFIX}'. Proceeding with destroy."

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Compute backend config
        id: backend
        run: |
          set -euo pipefail
          # Deterministic, non-identifying remote-state names (match deploy.yml / scripts/deploy.*).
          STATE_RG="rg-${TF_PREFIX}-tfstate"
          STATE_HASH="$(printf '%s' "${ARM_SUBSCRIPTION_ID}-${TF_PREFIX}" | sha256sum | cut -c1-16)"
          STATE_SA="sttf${STATE_HASH}"
          STATE_CONTAINER="tfstate"
          STATE_KEY="${TF_PREFIX}-${TF_ENVIRONMENT}.tfstate"

          # Don't hard-fail when state storage is missing: the force-delete path
          # works off resource-group name patterns and needs no state at all.
          if az storage account show --name "${STATE_SA}" --resource-group "${STATE_RG}" >/dev/null 2>&1; then
            echo "state_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "state_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Remote state storage '${STATE_SA}' not found; skipping terraform destroy."
          fi

          {
            echo "state_rg=${STATE_RG}"
            echo "state_sa=${STATE_SA}"
            echo "state_container=${STATE_CONTAINER}"
            echo "state_key=${STATE_KEY}"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # Normal path: terraform destroy, made resilient to orphaned Container
      # Apps. If state has drifted (apps exist in Azure but not in state), the
      # Container App Environment delete returns 409 ManagedEnvironmentHasContainerApps.
      # We catch that, delete any Container Apps still in the app RG, and retry.
      # ---------------------------------------------------------------------
      - name: Terraform init (remote state)
        if: ${{ github.event.inputs.force_delete_rg != 'true' && steps.backend.outputs.state_exists == 'true' }}
        working-directory: infra
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="resource_group_name=${{ steps.backend.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.state_sa }}" \
            -backend-config="container_name=${{ steps.backend.outputs.state_container }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}"

      - name: Terraform destroy
        if: ${{ github.event.inputs.force_delete_rg != 'true' && steps.backend.outputs.state_exists == 'true' }}
        working-directory: infra
        run: |
          set -euo pipefail
          # deploy_apps=true + a placeholder image_tag so the configuration matches
          # the deployed state; destroy removes everything tracked in state regardless.
          APP_RG="$(terraform output -raw resource_group_name 2>/dev/null || true)"

          destroy() {
            terraform destroy -input=false -auto-approve \
              -var 'deploy_apps=true' \
              -var 'image_tag=destroy' \
              -var "prefix=${TF_PREFIX}" \
              -var "environment=${TF_ENVIRONMENT}" \
              -var "location=${TF_LOCATION}"
          }

          if destroy; then
            exit 0
          fi

          echo "::warning::terraform destroy failed. Removing any orphaned Container Apps in '${APP_RG}' and retrying."
          if [[ -n "${APP_RG}" ]] && az group show -n "${APP_RG}" >/dev/null 2>&1; then
            # Use the generic resource API so no az containerapp extension is required.
            for id in $(az resource list -g "${APP_RG}" \
                          --resource-type Microsoft.App/containerApps \
                          --query "[].id" -o tsv 2>/dev/null || true); do
              echo "  deleting orphaned Container App: ${id}"
              az resource delete --ids "${id}" 2>/dev/null || true
            done
          fi
          destroy

      # ---------------------------------------------------------------------
      # Force path: nuke the environment resource group(s) directly. This does
      # not rely on Terraform state, so it recovers a badly drifted environment.
      # Names are rg-<prefix>-<env>-<suffix>, so we match on that prefix.
      # ---------------------------------------------------------------------
      - name: Force delete resource group(s)
        if: ${{ github.event.inputs.force_delete_rg == 'true' }}
        run: |
          set -euo pipefail
          PATTERN="rg-${TF_PREFIX}-${TF_ENVIRONMENT}-"
          echo "==> Nuke mode: deleting resource groups starting with '${PATTERN}'"
          mapfile -t RGS < <(az group list --query "[?starts_with(name, '${PATTERN}')].name" -o tsv)
          if [[ ${#RGS[@]} -eq 0 ]]; then
            echo "No matching resource groups found (already gone)."
          else
            for rg in "${RGS[@]}"; do
              echo "  deleting ${rg}"
              az group delete -n "${rg}" --yes
            done
          fi

      - name: Reset remote state after force delete
        if: ${{ github.event.inputs.force_delete_rg == 'true' && steps.backend.outputs.state_exists == 'true' }}
        run: |
          set -euo pipefail
          echo "==> Resetting remote state so the next deploy generates a fresh suffix"
          # Break any stale lock lease first, then delete the state blob.
          az storage blob lease break \
            --account-name "${{ steps.backend.outputs.state_sa }}" \
            --container-name "${{ steps.backend.outputs.state_container }}" \
            --blob-name "${{ steps.backend.outputs.state_key }}" \
            --auth-mode login 2>/dev/null || true
          az storage blob delete \
            --account-name "${{ steps.backend.outputs.state_sa }}" \
            --container-name "${{ steps.backend.outputs.state_container }}" \
            --name "${{ steps.backend.outputs.state_key }}" \
            --auth-mode login 2>/dev/null || true

      - name: Delete remote state storage (optional)
        if: ${{ github.event.inputs.delete_state_storage == 'true' && steps.backend.outputs.state_exists == 'true' }}
        run: |
          set -euo pipefail
          az network private-endpoint delete \
            --resource-group "${TF_VAR_runner_vnet_resource_group}" \
            --name "pe-${{ steps.backend.outputs.state_sa }}-blob" 2>/dev/null || true
          echo "==> Deleting remote state resource group ${{ steps.backend.outputs.state_rg }}"
          az group delete --name "${{ steps.backend.outputs.state_rg }}" --yes

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## ContosoPay environment destroy"
            echo ""
            if [[ "${{ job.status }}" == "success" ]]; then
              echo "Terraform destroy completed for prefix \`${TF_PREFIX}\` (env \`${TF_ENVIRONMENT}\`)."
            else
              echo "Destroy did not complete cleanly -- check the job logs above."
            fi
            echo ""
            if [[ "${{ github.event.inputs.delete_state_storage }}" == "true" ]]; then
              echo "Remote state storage RG \`${{ steps.backend.outputs.state_rg }}\` deletion was requested (running asynchronously)."
            else
              echo "Remote state storage was kept. Re-run with **delete_state_storage** to remove it too."
            fi
            echo ""
            echo "> Key Vault has purge protection, so it is soft-deleted (not purged) and ages out after its retention window."
          } >> "$GITHUB_STEP_SUMMARY"

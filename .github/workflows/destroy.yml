name: destroy

# Manual teardown of one scenario-isolated environment. Force recovery reads the
# raw state blob and never evaluates Terraform or optional deployment metadata.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Deployment scenario"
        type: choice
        required: true
        options: [A, B, C]
      prefix:
        description: "Resource name prefix"
        required: false
        default: "contosopay"
      environment:
        description: "Environment label"
        required: false
        default: "demo"
      confirm:
        description: "Type <prefix>-<scenario>-<environment> to confirm"
        required: true
      force_delete_rg:
        description: "Recovery only: delete the exact resource group recorded in verified state, then reset that state"
        type: boolean
        required: false
        default: false
      delete_state_storage:
        description: "Delete this scenario/environment state blob after destroy (the shared state account is retained)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: deployment-${{ inputs.scenario }}-${{ inputs.prefix }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ${{ inputs.scenario == 'C' && fromJSON('["self-hosted","Linux","X64","azure-private","contosopay"]') || 'ubuntu-latest' }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      DEPLOYMENT_SCENARIO: ${{ inputs.scenario }}
      TF_PREFIX: ${{ inputs.prefix }}
      TF_ENVIRONMENT: ${{ inputs.environment }}
      IMAGE_TAG: ${{ github.sha }}
      REPOSITORY_SCENARIO: ${{ vars.DEPLOYMENT_SCENARIO }}
      REPOSITORY_PREFIX: ${{ vars.TF_PREFIX }}
      REPOSITORY_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT }}
      SRE_AGENT_MODEL_PROVIDER: ${{ vars.SRE_AGENT_MODEL_PROVIDER || 'MicrosoftFoundry' }}
      SRE_AGENT_MODEL_NAME: ${{ vars.SRE_AGENT_MODEL_NAME || 'Automatic' }}
    steps:
      - name: Validate destruction request
        shell: bash
        env:
          CONFIRM_INPUT: ${{ inputs.confirm }}
          FORCE_DELETE_RG: ${{ inputs.force_delete_rg }}
        run: |
          set -euo pipefail
          readonly PREFIX_PATTERN='^[a-z][a-z0-9]{1,16}$'
          readonly ENVIRONMENT_PATTERN='^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$'
          readonly SCENARIO_PATTERN='^(A|B|C)$'
          [[ "${DEPLOYMENT_SCENARIO}" =~ ${SCENARIO_PATTERN} ]] || { echo "::error::Scenario must be A, B, or C."; exit 1; }
          [[ "${TF_PREFIX}" =~ ${PREFIX_PATTERN} ]] || { echo "::error::Invalid prefix '${TF_PREFIX}'."; exit 1; }
          [[ "${TF_ENVIRONMENT}" =~ ${ENVIRONMENT_PATTERN} ]] || { echo "::error::Invalid environment '${TF_ENVIRONMENT}'."; exit 1; }
          EXPECTED_CONFIRM="${TF_PREFIX}-${DEPLOYMENT_SCENARIO}-${TF_ENVIRONMENT}"
          [[ "${CONFIRM_INPUT}" == "${EXPECTED_CONFIRM}" ]] || { echo "::error::Confirmation does not match the selected profile. Expected '${EXPECTED_CONFIRM}'."; exit 1; }
          for value in ARM_CLIENT_ID ARM_TENANT_ID ARM_SUBSCRIPTION_ID; do
            [[ -n "${!value}" ]] || { echo "::error::Repository variable ${value} is required."; exit 1; }
          done
          if [[ "${FORCE_DELETE_RG}" != "true" ]]; then
            readonly SHA_PATTERN='^[0-9a-f]{40}$'
            if [[ -n "${REPOSITORY_SCENARIO}${REPOSITORY_PREFIX}${REPOSITORY_ENVIRONMENT}" ]]; then
              [[ "${REPOSITORY_SCENARIO}" =~ ${SCENARIO_PATTERN} ]] || { echo "::error::Repository variable DEPLOYMENT_SCENARIO must be A, B, or C."; exit 1; }
              [[ "${REPOSITORY_PREFIX}" =~ ${PREFIX_PATTERN} ]] || { echo "::error::Repository variable TF_PREFIX must be configured with the active scenario."; exit 1; }
              [[ "${REPOSITORY_ENVIRONMENT}" =~ ${ENVIRONMENT_PATTERN} ]] || { echo "::error::Repository variable TF_ENVIRONMENT must be configured with the active scenario."; exit 1; }
              [[ "${DEPLOYMENT_SCENARIO}" == "${REPOSITORY_SCENARIO}" && "${TF_PREFIX}" == "${REPOSITORY_PREFIX}" && "${TF_ENVIRONMENT}" == "${REPOSITORY_ENVIRONMENT}" ]] || { echo "::error::The destroy target does not match the active repository profile."; exit 1; }
            fi
            [[ "${IMAGE_TAG}" =~ ${SHA_PATTERN} ]] || { echo "::error::github.sha is not a full commit SHA."; exit 1; }
            {
              echo "TF_VAR_scenario=${DEPLOYMENT_SCENARIO}"
              echo "TF_VAR_enable_sre_agents=true"
              echo "TF_VAR_sre_agent_model_provider=${SRE_AGENT_MODEL_PROVIDER}"
              echo "TF_VAR_sre_agent_model_name=${SRE_AGENT_MODEL_NAME}"
            } >> "${GITHUB_ENV}"
          fi

      - name: Checkout
        if: ${{ inputs.force_delete_rg == false }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure Scenario C private networking
        if: ${{ inputs.scenario == 'C' && inputs.force_delete_rg == false }}
        shell: bash
        env:
          RUNNER_NETWORK_RG: ${{ vars.RUNNER_NETWORK_RG || 'agentrg' }}
          RUNNER_VNET_NAME: ${{ vars.RUNNER_VNET_NAME || 'agent-vnet' }}
          RUNNER_PE_SUBNET_NAME: ${{ vars.RUNNER_PE_SUBNET_NAME || 'private-endpoints' }}
          APP_VNET_ADDRESS_SPACE: ${{ vars.APP_VNET_ADDRESS_SPACE || '10.100.0.0/16' }}
          APP_PE_SUBNET_PREFIX: ${{ vars.APP_PE_SUBNET_PREFIX || '10.100.0.0/27' }}
          CONTAINER_APPS_SUBNET_PREFIX: ${{ vars.CONTAINER_APPS_SUBNET_PREFIX || '10.100.0.64/27' }}
          SRE_AGENT_SUBNET_PREFIX: ${{ vars.SRE_AGENT_SUBNET_PREFIX || '10.100.0.96/27' }}
        run: |
          {
            echo "TF_VAR_runner_vnet_resource_group=${RUNNER_NETWORK_RG}"
            echo "TF_VAR_runner_vnet_name=${RUNNER_VNET_NAME}"
            echo "TF_VAR_runner_private_endpoint_subnet_name=${RUNNER_PE_SUBNET_NAME}"
            echo "TF_VAR_app_vnet_address_space=${APP_VNET_ADDRESS_SPACE}"
            echo "TF_VAR_app_private_endpoint_subnet_address_prefix=${APP_PE_SUBNET_PREFIX}"
            echo "TF_VAR_container_apps_subnet_address_prefix=${CONTAINER_APPS_SUBNET_PREFIX}"
            echo "TF_VAR_sre_agent_subnet_address_prefix=${SRE_AGENT_SUBNET_PREFIX}"
          } >> "${GITHUB_ENV}"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        if: ${{ inputs.force_delete_rg == false }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Resolve scenario-isolated backend
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          STATE_HASH="$(printf '%s\0%s\0%s' "${ARM_SUBSCRIPTION_ID}" "${TF_PREFIX}" "${DEPLOYMENT_SCENARIO}" | sha256sum | cut -c1-16)"
          STATE_RG="rg-${TF_PREFIX}-tfstate"
          STATE_SA="sttf${STATE_HASH}"
          STATE_KEY="${TF_PREFIX}-${DEPLOYMENT_SCENARIO}-${TF_ENVIRONMENT}.tfstate"
          az storage account show -n "${STATE_SA}" -g "${STATE_RG}" >/dev/null 2>&1 || { echo "::error::Selected scenario backend does not exist."; exit 1; }
          EXISTS="$(az storage blob exists --account-name "${STATE_SA}" --container-name tfstate --name "${STATE_KEY}" --auth-mode login --query exists -o tsv)"
          [[ "${EXISTS}" == true ]] || { echo "::error::Selected scenario state blob does not exist; refusing unverified destruction."; exit 1; }
          {
            echo "state_rg=${STATE_RG}"
            echo "state_sa=${STATE_SA}"
            echo "state_key=${STATE_KEY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Terraform init and verify scenario
        if: ${{ inputs.force_delete_rg == false }}
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="resource_group_name=${{ steps.backend.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.state_sa }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}"
          terraform state list | grep -Fxq 'azurerm_resource_group.this' || { echo "::error::Selected state has no environment to destroy."; exit 1; }
          ACTUAL_SCENARIO="$(terraform output -raw scenario 2>/dev/null)" || { echo "::error::State has no scenario output; unverified destruction and in-place conversion are forbidden."; exit 1; }
          [[ "${ACTUAL_SCENARIO}" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::State scenario '${ACTUAL_SCENARIO}' does not match requested '${DEPLOYMENT_SCENARIO}'."; exit 1; }
          {
            echo "TF_LOCATION=$(terraform output -raw location)"
            echo "APP_RESOURCE_GROUP=$(terraform output -raw resource_group_name)"
          } >> "${GITHUB_ENV}"

      - name: Terraform destroy
        if: ${{ inputs.force_delete_rg == false }}
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(terraform output -raw scenario)" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::Scenario mismatch immediately before destroy."; exit 1; }
          stop_sre_agents() {
            if [[ "${DEPLOYMENT_SCENARIO}" != "C" ]]; then
              return 0
            fi
            for id in $(az resource list -g "${APP_RESOURCE_GROUP}" --resource-type Microsoft.App/agents --query '[].id' -o tsv 2>/dev/null || true); do
              echo "Stopping SRE Agent before destroy: ${id}"
              az rest --method post --url "https://management.azure.com${id}/stop?api-version=2025-05-01-preview" --only-show-errors >/dev/null || true
            done
          }
          destroy() {
            terraform destroy -input=false -auto-approve \
              -var 'deploy_apps=false' -var "image_tag=${IMAGE_TAG}" \
              -var "scenario=${DEPLOYMENT_SCENARIO}" -var "prefix=${TF_PREFIX}" \
              -var "environment=${TF_ENVIRONMENT}" -var "location=${TF_LOCATION}"
          }
          stop_sre_agents
          if destroy; then exit 0; fi
          echo "::warning::Terraform destroy failed; deleting orphaned Container Apps in the verified resource group and retrying."
          for id in $(az resource list -g "${APP_RESOURCE_GROUP}" --resource-type Microsoft.App/containerApps --query '[].id' -o tsv 2>/dev/null || true); do
            az resource delete --ids "${id}" || true
          done
          stop_sre_agents
          destroy

      - name: Force delete exact verified resource group
        if: ${{ inputs.force_delete_rg }}
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || { echo "::error::Force recovery requires jq on the selected runner."; exit 1; }
          STATE_FILE="${RUNNER_TEMP}/verified-force-destroy.tfstate"
          az storage blob download \
            --account-name "${{ steps.backend.outputs.state_sa }}" \
            --container-name tfstate \
            --name "${{ steps.backend.outputs.state_key }}" \
            --file "${STATE_FILE}" \
            --auth-mode login \
            --overwrite \
            --output none
          jq -e '.version == 4 and (.resources | type == "array")' "${STATE_FILE}" >/dev/null || { echo "::error::Selected blob is not a supported Terraform state."; exit 1; }
          ACTUAL_SCENARIO="$(jq -er '.outputs.scenario.value' "${STATE_FILE}")" || { echo "::error::State has no scenario output."; exit 1; }
          [[ "${ACTUAL_SCENARIO}" == "${DEPLOYMENT_SCENARIO}" ]] || { echo "::error::State scenario '${ACTUAL_SCENARIO}' does not match requested '${DEPLOYMENT_SCENARIO}'."; exit 1; }
          RG_JSON="$(jq -ce '
            [.resources[]
             | select(.mode == "managed" and .type == "azurerm_resource_group" and .name == "this")
             | .instances[].attributes]
            | if length == 1 then .[0] else error("expected one managed resource group") end
          ' "${STATE_FILE}")"
          APP_RESOURCE_GROUP="$(jq -er '.name' <<< "${RG_JSON}")"
          STATE_RG_ID="$(jq -er '.id' <<< "${RG_JSON}")"
          EXPECTED_RG_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${APP_RESOURCE_GROUP}"
          [[ "${STATE_RG_ID,,}" == "${EXPECTED_RG_ID,,}" ]] || { echo "::error::State resource group ID is outside the authenticated subscription."; exit 1; }
          jq -e \
            --arg scenario "${DEPLOYMENT_SCENARIO}" \
            --arg environment "${TF_ENVIRONMENT}" \
            '.tags.project == "sre-agent-demo"
             and .tags.managed_by == "terraform"
             and .tags.scenario == $scenario
             and .tags.env == $environment' \
            <<< "${RG_JSON}" >/dev/null || { echo "::error::State resource group tags do not match the requested scenario profile."; exit 1; }

          LIVE_RG="$(az group show --name "${APP_RESOURCE_GROUP}" --output json)"
          LIVE_RG_ID="$(jq -er '.id' <<< "${LIVE_RG}")"
          [[ "${LIVE_RG_ID,,}" == "${STATE_RG_ID,,}" ]] || { echo "::error::Live resource group ID does not match verified state."; exit 1; }
          jq -e \
            --arg scenario "${DEPLOYMENT_SCENARIO}" \
            --arg environment "${TF_ENVIRONMENT}" \
            '.tags.project == "sre-agent-demo"
             and .tags.managed_by == "terraform"
             and .tags.scenario == $scenario
             and .tags.env == $environment' \
            <<< "${LIVE_RG}" >/dev/null || { echo "::error::Live resource group tags do not match verified state."; exit 1; }

          SHARED_PEERINGS="$(jq -ce --arg rgId "${STATE_RG_ID}" '
            [.resources[]
             | select(.mode == "managed"
                 and .type == "azurerm_virtual_network_peering"
                 and .name == "runner_to_app")
             | .instances[].attributes
             | select(.id != null and .remote_virtual_network_id != null)
             | select((.remote_virtual_network_id | ascii_downcase)
                 | startswith(($rgId | ascii_downcase) + "/providers/microsoft.network/virtualnetworks/"))]
            | if length <= 1 then . else error("expected at most one shared runner peering") end
          ' "${STATE_FILE}")"
          while IFS= read -r peering_id; do
            [[ "${peering_id,,}" == "/subscriptions/${ARM_SUBSCRIPTION_ID,,}/resourcegroups/"*"/providers/microsoft.network/virtualnetworks/"*"/virtualnetworkpeerings/peer-runner-to-app-"* ]] || {
              echo "::error::Verified state contains an unexpected shared peering ID."
              exit 1
            }
            if az resource show --ids "${peering_id}" --api-version 2024-05-01 >/dev/null 2>&1; then
              az resource delete --ids "${peering_id}" --api-version 2024-05-01
            fi
          done < <(jq -r '.[].id' <<< "${SHARED_PEERINGS}")

          if [[ "${DEPLOYMENT_SCENARIO}" == "C" ]]; then
            for id in $(az resource list -g "${APP_RESOURCE_GROUP}" --resource-type Microsoft.App/agents --query '[].id' -o tsv 2>/dev/null || true); do
              echo "Stopping SRE Agent before force delete: ${id}"
              az rest --method post --url "https://management.azure.com${id}/stop?api-version=2025-05-01-preview" --only-show-errors >/dev/null || true
            done
          fi

          az group delete --name "${APP_RESOURCE_GROUP}" --yes
          [[ "$(az group exists --name "${APP_RESOURCE_GROUP}")" == "false" ]] || { echo "::error::Resource group deletion did not complete; retaining state."; exit 1; }
          az storage blob lease break --account-name "${{ steps.backend.outputs.state_sa }}" --container-name tfstate --blob-name "${{ steps.backend.outputs.state_key }}" --auth-mode login 2>/dev/null || true
          az storage blob delete --account-name "${{ steps.backend.outputs.state_sa }}" --container-name tfstate --name "${{ steps.backend.outputs.state_key }}" --auth-mode login

      - name: Delete isolated state blob after normal destroy
        if: ${{ success() && inputs.force_delete_rg == false && inputs.delete_state_storage }}
        shell: bash
        run: |
          set -euo pipefail
          az storage blob lease break --account-name "${{ steps.backend.outputs.state_sa }}" --container-name tfstate --blob-name "${{ steps.backend.outputs.state_key }}" --auth-mode login 2>/dev/null || true
          az storage blob delete --account-name "${{ steps.backend.outputs.state_sa }}" --container-name tfstate --name "${{ steps.backend.outputs.state_key }}" --auth-mode login

      - name: Summary
        if: ${{ always() }}
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Scenario ${DEPLOYMENT_SCENARIO} destroy"
            echo ""
            echo "Profile: \`${TF_PREFIX}/${TF_ENVIRONMENT}\`"
            echo "Status: \`${{ job.status }}\`"
            echo "The state account is retained because it can contain other environments for this scenario."
            echo "Key Vault purge protection can retain soft-deleted vault data until its retention period expires."
            if [[ "${JOB_STATUS}" == "success" && "${DEPLOYMENT_SCENARIO}" == "${REPOSITORY_SCENARIO}" && "${TF_PREFIX}" == "${REPOSITORY_PREFIX}" && "${TF_ENVIRONMENT}" == "${REPOSITORY_ENVIRONMENT}" ]]; then
              echo 'Delete `DEPLOYMENT_SCENARIO`, `TF_PREFIX`, and `TF_ENVIRONMENT` before dispatching a different profile.'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"